services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      MONGO_URI: mongodb://mongo:27017/feedpulse
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      WEEKLY_SUMMARY_ENABLED: ${WEEKLY_SUMMARY_ENABLED:-true}
      WEEKLY_SUMMARY_DAY: ${WEEKLY_SUMMARY_DAY:-1}
      WEEKLY_SUMMARY_HOUR: ${WEEKLY_SUMMARY_HOUR:-9}
      WEEKLY_SUMMARY_MINUTE: ${WEEKLY_SUMMARY_MINUTE:-0}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
